dbt_wms:
  target: local
  outputs:

    # ── Local Docker (PostgreSQL) — target padrão ──────────────
    local:
      type: postgres
      host: "{{ env_var('POSTGRES_HOST', 'localhost') }}"
      port: 5432
      user: "{{ env_var('POSTGRES_USER', 'wmsadmin') }}"
      password: "{{ env_var('POSTGRES_PASSWORD', 'wmsadmin2026') }}"
      dbname: "{{ env_var('POSTGRES_DB', 'wms') }}"
      schema: gold
      threads: 4

    dev:
      type: glue
      role_arn: arn:aws:iam::896159010925:role/wms-data-platform-dev-glue-role
      region: us-east-1
      workers: 2
      worker_type: G.1X
      glue_version: "4.0"
      schema: wms_silver_dev
      location: s3://wms-dp-dev-silver-us-east-1-896159010925/
      conf: spark.sql.legacy.allowNonEmptyLocationInCTAS=true

    prod:
      type: glue
      role_arn: arn:aws:iam::896159010925:role/wms-data-platform-prod-glue-role
      region: us-east-1
      workers: 4
      worker_type: G.1X
      glue_version: "4.0"
      schema: wms_silver_prod
      location: s3://wms-dp-prod-silver-us-east-1-896159010925/
      conf: spark.sql.legacy.allowNonEmptyLocationInCTAS=true

    # prod_redshift: alvo futuro após provisionamento do Redshift Serverless
    # prod_redshift:
    #   type: redshift
    #   host: placeholder
    #   user: placeholder
    #   password: placeholder
    #   port: 5439
    #   dbname: wms
    #   schema: marts
