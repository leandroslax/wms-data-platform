version: 2

models:
  - name: fct_orders
    description: "Fact table for WMS order activity."
    columns:
      - name: order_id
        tests:
          - not_null
          - unique

  - name: fct_inventory_snapshot
    description: "Fact table for inventory position snapshots."
    columns:
      - name: inventory_id
        tests:
          - not_null
          - unique

  - name: fct_movements
    description: "Fact table for stock movement activity."
    columns:
      - name: movement_id
        tests:
          - not_null
          - unique

  - name: dim_products
    description: "Product dimension keyed by product + warehouse (one row per sku/warehouse combination)."
    columns:
      - name: product_id
        tests:
          - not_null

  - name: mart_order_sla
    description: "SLA performance per order — cycle time and compliance classification."
    columns:
      - name: order_id
        tests:
          - not_null
          - unique
      - name: sla_status
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['pending', 'on_time_express', 'on_time', 'at_risk', 'late']

  - name: mart_inventory_health
    description: "Inventory health per SKU/warehouse — coverage days and stockout risk."
    columns:
      - name: inventory_id
        tests:
          - not_null
          - unique
      - name: stockout_risk
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['critical', 'high', 'medium', 'healthy']

  - name: mart_stockout_risk
    description: "Stockout risk projection per SKU/warehouse — days to stockout."
    columns:
      - name: inventory_id
        tests:
          - not_null
          - unique
      - name: risk_level
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['stockout', 'critical', 'high', 'medium', 'low']

  - name: mart_operator_productivity
    description: "Daily operator productivity — movement volume, complexity index and ranking."
    columns:
      - name: operator_user
        tests:
          - not_null
      - name: period_date
        tests:
          - not_null

  - name: mart_picking_performance
    description: "Picking performance per operator and shift — picks per hour and qty handled."
    columns:
      - name: operator_user
        tests:
          - not_null
      - name: shift_date
        tests:
          - not_null
      - name: shift
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['morning', 'afternoon', 'night']

  - name: mart_geo_performance
    description: >
      SLA performance aggregated by company/depositor and month with geographic enrichment.
      City, state, region and coordinates sourced from bronze.geo_reference via ViaCEP pipeline.
      Used for choropleth maps in Grafana (SLA by state/region).
    columns:
      - name: company_id
        tests:
          - not_null
      - name: issued_month
        tests:
          - not_null
      - name: uf
        description: "State code from geo_reference (null if entity not yet enriched)"
      - name: regiao
        description: "Brazilian macro-region (Sudeste, Sul, Nordeste, Norte, Centro-Oeste)"
      - name: latitude
        description: "State centroid latitude for map rendering"
      - name: longitude
        description: "State centroid longitude for map rendering"

  - name: mart_geo_inventory
    description: >
      Inventory health aggregated by warehouse and product class with geographic enrichment.
      Warehouse location sourced from bronze.geo_reference (city, state, region, lat/long).
      Used for Grafana choropleth: inventory coverage by state.
    columns:
      - name: warehouse_id
        tests:
          - not_null
      - name: uf
        description: "State code from geo_reference (null if warehouse not yet enriched)"
      - name: regiao
        description: "Brazilian macro-region"

  - name: mart_weather_impact
    description: >
      Delay metrics correlated with daily weather by company/depositor and day.
      Weather data sourced from bronze.weather_daily (Open-Meteo Archive API via dag_enrich_geo).
      Enables Grafana panels correlating delay_rate_pct with precipitation and temperature.
    columns:
      - name: company_id
        tests:
          - not_null
      - name: issued_date
        tests:
          - not_null
      - name: weather_condition
        description: "WMO weather description in Portuguese (null if no geo_reference for company)"
      - name: precipitation_mm
        description: "Total precipitation on the order date (mm)"
      - name: avg_temperature_c
        description: "Mean temperature on the order date (°C)"
      - name: wind_speed_kmh
        description: "Max wind speed on the order date (km/h)"
