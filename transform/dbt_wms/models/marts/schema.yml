version: 2

models:
  - name: fct_orders
    description: "Fact table for WMS order activity."
    columns:
      - name: order_id
        tests:
          - not_null
          - unique

  - name: fct_inventory_snapshot
    description: "Fact table for inventory position snapshots."
    columns:
      - name: inventory_id
        tests:
          - not_null
          - unique

  - name: fct_movements
    description: "Fact table for stock movement activity."
    columns:
      - name: movement_id
        tests:
          - not_null
          - unique

  - name: dim_products
    description: "Minimal product dimension derived from transactional activity."
    columns:
      - name: product_id
        tests:
          - not_null
          - unique

  - name: mart_order_sla
    description: "SLA performance per order — cycle time and compliance classification."
    columns:
      - name: order_id
        tests:
          - not_null
          - unique
      - name: sla_status
        tests:
          - not_null
          - accepted_values:
              values: ['pending', 'on_time_express', 'on_time', 'at_risk', 'late']

  - name: mart_inventory_health
    description: "Inventory health per SKU/warehouse — coverage days and stockout risk."
    columns:
      - name: inventory_id
        tests:
          - not_null
          - unique
      - name: stockout_risk
        tests:
          - not_null
          - accepted_values:
              values: ['critical', 'high', 'medium', 'healthy', 'unknown']

  - name: mart_stockout_risk
    description: "Stockout risk projection per SKU/warehouse — days to stockout."
    columns:
      - name: inventory_id
        tests:
          - not_null
          - unique
      - name: risk_level
        tests:
          - not_null
          - accepted_values:
              values: ['stockout', 'critical', 'high', 'medium', 'low', 'unknown']

  - name: mart_operator_productivity
    description: "Daily operator productivity — movement volume, complexity index and ranking."
    columns:
      - name: operator_user
        tests:
          - not_null
      - name: period_date
        tests:
          - not_null

  - name: mart_picking_performance
    description: "Picking performance per operator and shift — picks per hour and qty handled."
    columns:
      - name: operator_user
        tests:
          - not_null
      - name: shift_date
        tests:
          - not_null
      - name: shift
        tests:
          - not_null
          - accepted_values:
              values: ['morning', 'afternoon', 'night']

  - name: mart_geo_performance
    description: >
      SLA performance aggregated by company/depositor and month.
      Geographic enrichment (city/state) pending ViaCEP pipeline.
    columns:
      - name: company_id
        tests:
          - not_null
      - name: issued_month
        tests:
          - not_null

  - name: mart_geo_inventory
    description: >
      Inventory health aggregated by warehouse and product class.
      Geographic enrichment (city/state) pending ViaCEP pipeline.
    columns:
      - name: warehouse_id
        tests:
          - not_null

  - name: mart_weather_impact
    description: >
      Delay metrics by company/depositor and day.
      Weather correlation (weather_condition) pending INMET enrichment pipeline.
    columns:
      - name: company_id
        tests:
          - not_null
      - name: issued_date
        tests:
          - not_null
