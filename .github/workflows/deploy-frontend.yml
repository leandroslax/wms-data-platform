name: Deploy Frontend

on:
  workflow_dispatch:
  push:
    branches: [dev, main]
    paths:
      - "web/**"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: cd web && npm install && npm run build
