# ─────────────────────────────────────────────────────────────
# WMS Data Platform — Local Docker Stack
# Usage: make up          → sobe tudo
#        make seed        → popula bronze com dados de amostra
#        make dbt-run     → roda todos os modelos dbt
#        make dbt-test    → roda testes dbt
# ─────────────────────────────────────────────────────────────

x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: Dockerfile.airflow
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://wmsadmin:${POSTGRES_PASSWORD:-wmsadmin2026}@postgres:5432/airflow
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY:-zTGhSjBDfmR1sxlPkQpgfO1h8vMWnYxq2eCdu7KtIaA=}
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "false"
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.basic_auth
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
    ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    DBT_BRONZE_SCHEMA: bronze
    POSTGRES_HOST: postgres
    POSTGRES_PORT: "5432"
    POSTGRES_DB: wms
    POSTGRES_USER: wmsadmin
    POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-wmsadmin2026}
    ORACLE_HOST: ${ORACLE_HOST:-172.31.200.25}
    ORACLE_PORT: ${ORACLE_PORT:-1521}
    ORACLE_SERVICE_NAME: ${ORACLE_SERVICE_NAME:-WMS}
    ORACLE_USER: ${ORACLE_USER:-de}
    ORACLE_PASSWORD: ${ORACLE_PASSWORD:-}
    QDRANT_URL: http://qdrant:6333
  volumes:
    - ./pipelines/dags:/opt/airflow/dags
    - ./pipelines:/opt/airflow/pipelines
    - ./transform/dbt_wms:/opt/airflow/dbt_wms
    - ./docs:/opt/airflow/docs
    - airflow_logs:/opt/airflow/logs
    - airflow_plugins:/opt/airflow/plugins
  depends_on:
    postgres:
      condition: service_healthy
  networks:
    - wms_net

services:

  # ── PostgreSQL ─────────────────────────────────────────────
  # bronze / silver / gold schemas  +  airflow metadata DB
  postgres:
    image: postgres:16
    container_name: wms-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: wmsadmin
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-wmsadmin2026}
      POSTGRES_DB: wms
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/01_init.sql
      - ./docker/postgres/02_create_airflow_db.sh:/docker-entrypoint-initdb.d/02_create_airflow_db.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wmsadmin -d wms"]
      interval: 10s
      retries: 5
      start_period: 10s
    networks:
      - wms_net

  # ── Qdrant (vector store para RAG) ────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.9.0
    container_name: wms-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - wms_net

  # ── MinIO (S3 local) ───────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: wms-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-wmsadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-wmsadmin2026}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - wms_net

  # ── FastAPI (API + Agents) ────────────────────────────────
  api:
    build:
      context: .
      dockerfile: app/Dockerfile
    container_name: wms-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: wms
      POSTGRES_USER: wmsadmin
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-wmsadmin2026}
      QDRANT_URL: http://qdrant:6333
      QDRANT_API_KEY: ""
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      CHROMA_OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-}
      LANGFUSE_HOST: ${LANGFUSE_HOST:-https://cloud.langfuse.com}
    volumes:
      - ./app:/workspace/app
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - wms_net

  # ── Airflow init (executa uma vez) ────────────────────────
  airflow-init:
    <<: *airflow-common
    container_name: wms-airflow-init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
        airflow users create \
          --username admin \
          --password admin \
          --firstname WMS \
          --lastname Admin \
          --role Admin \
          --email admin@wms.local || true
    restart: "no"

  # ── Airflow webserver ──────────────────────────────────────
  airflow-webserver:
    <<: *airflow-common
    container_name: wms-airflow-webserver
    command: webserver
    ports:
      - "8080:8080"
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  # ── Airflow scheduler ──────────────────────────────────────
  airflow-scheduler:
    <<: *airflow-common
    container_name: wms-airflow-scheduler
    command: scheduler
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  # ── Grafana (dashboards) ──────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.2
    container_name: wms-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${POSTGRES_PASSWORD:-wmsadmin2026}
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_USERS_ALLOW_SIGN_UP: "false"
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-wmsadmin2026}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning
      - ./docker/grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - wms_net

  # ── Apache Superset ───────────────────────────────────────
  superset:
    image: apache/superset:3.1.0
    container_name: wms-superset
    restart: unless-stopped
    ports:
      - "8088:8088"
    environment:
      SUPERSET_SECRET_KEY: "wms-superset-secret-2026"
      SUPERSET_LOAD_EXAMPLES: "no"
    volumes:
      - superset_data:/app/superset_home
    networks:
      - wms_net
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      bash -c "
        pip install psycopg2-binary --quiet &&
        superset db upgrade &&
        superset fab create-admin --username admin --firstname Admin --lastname WMS --email admin@wms.local --password admin123 2>/dev/null || true &&
        superset init &&
        superset run -h 0.0.0.0 -p 8088
      "

volumes:
  postgres_data:
  qdrant_data:
  minio_data:
  airflow_logs:
  airflow_plugins:
  grafana_data:
  superset_data:

networks:
  wms_net:
    driver: bridge
